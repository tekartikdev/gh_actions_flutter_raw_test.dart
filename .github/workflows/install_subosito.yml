name: subosito/flutter-action@v2 install
on:
  push:
  workflow_dispatch:
jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
      - run: dart --version
      - run: flutter --version